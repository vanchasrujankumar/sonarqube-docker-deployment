name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yml
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Docker Compose
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.sonarqube

      - name: Validate Docker Compose
        run: |
          docker compose config
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SonarQube image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sonarqube
          push: false
          tags: sonarqube-docker-deployment:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for testing
        run: |
          cp .env.example .env
          sed -i 's/change_this_strong_password/test_password_123/' .env

      - name: Start services
        run: |
          docker compose up -d --wait
          timeout 180 bash -c 'until curl -sf http://localhost:9000/api/system/health; do sleep 10; done'

      - name: Check service health
        run: |
          HEALTH=$(curl -sf http://localhost:9000/api/system/health)
          echo "Health: $HEALTH"
          [ "$HEALTH" = "GREEN" ] || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v

  yaml-lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
