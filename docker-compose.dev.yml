services:

  sonarqube:
    ports:
      - "${SONAR_HTTP_PORT:-9000}:9000"
    environment:
      SONAR_LOG_LEVEL: DEBUG
      SONAR_WEB_CONTEXT: ${SONAR_WEB_CONTEXT:-/}
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms256m"
    volumes:
      - ./config/sonar.properties:/opt/sonarqube/conf/sonar.properties:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  sonarqube_conf:
    name: sonarqube_conf_dev
  sonarqube_data:
    name: sonarqube_data_dev
  sonarqube_logs:
    name: sonarqube_logs_dev
  sonarqube_extensions:
    name: sonarqube_extensions_dev
  postgres_data:
    name: sonarqube_postgres_data_dev
