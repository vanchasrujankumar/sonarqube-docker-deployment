x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-deploy: &default-deploy
  resources:
    limits:
      cpus: "2"
      memory: 4G
    reservations:
      cpus: "1"
      memory: 2G

services:
  sonarqube:
    image: ${SONAR_IMAGE:-sonarqube:community}
    container_name: sonarqube
    build:
      context: .
      dockerfile: Dockerfile.sonarqube
      args:
        SONAR_VERSION: ${SONAR_VERSION:-community}
    hostname: sonarqube
    restart: unless-stopped
    ports:
      - "${SONAR_HTTP_PORT:-9000}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sonarqube}
      SONAR_JDBC_USERNAME: ${POSTGRES_USER:-sonarqube}
      SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD:?error}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_CONTEXT: ${SONAR_WEB_CONTEXT:-/}
      SONAR_TELEMETRY_ENABLE: "false"
      INIT_STATE: ${INIT_STATE:-latest}
      TZ: ${TZ:-UTC}
    volumes:
      - sonarqube_conf:/opt/sonarqube/conf
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
      - ./plugins:/opt/sonarqube/extensions/plugins:ro
      - ./config/sonar.properties:/opt/sonarqube/conf/sonar.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

  postgres:
    image: postgres:${POSTGRES_TAG:-17-alpine}
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonarqube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-sonarqube}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonarqube} -d ${POSTGRES_DB:-sonarqube}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  sonarqube_conf:
    name: sonarqube_conf
  sonarqube_data:
    name: sonarqube_data
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_extensions:
    name: sonarqube_extensions
  postgres_data:
    name: sonarqube_postgres_data
