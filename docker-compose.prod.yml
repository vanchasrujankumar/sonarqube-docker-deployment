services:

  sonarqube:
    restart: always
    ports:
      - "127.0.0.1:${SONAR_HTTP_PORT:-9000}:9000"
    environment:
      SONAR_LOG_LEVEL: WARN
      SONAR_WEB_CONTEXT: ${SONAR_WEB_CONTEXT:-/}
      SONAR_CE_JAVAOPTS: "-Xmx2g -Xms1g"
      SONAR_SEARCH_JAVAOPTS: "-Xmx2g -Xms1g"
      SONAR_WEB_JAVAOPTS: "-Xmx2g -Xms1g"
      SONAR_SECURITY_REALM: ${SONAR_SECURITY_REALM:-}
      SONAR_AUTHENTICATOR_IGNORE_STARTUP_FAILURE: "false"
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  nginx:
    image: nginx:${NGINX_TAG:-1.27-alpine}
    container_name: sonarqube-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      sonarqube:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  sonarqube_conf:
    name: sonarqube_conf_prod
  sonarqube_data:
    name: sonarqube_data_prod
  sonarqube_logs:
    name: sonarqube_logs_prod
  sonarqube_extensions:
    name: sonarqube_extensions_prod
  postgres_data:
    name: sonarqube_postgres_data_prod
