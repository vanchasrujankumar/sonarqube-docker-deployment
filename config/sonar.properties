# =============================================================================
# SonarQube Configuration
# =============================================================================

# --- Database ---
sonar.jdbc.url=jdbc:postgresql://postgres:5432/sonarqube
sonar.jdbc.username=sonarqube
sonar.jdbc.password=${env:SONAR_JDBC_PASSWORD}

# --- Web Server ---
sonar.web.host=0.0.0.0
sonar.web.port=9000
sonar.web.context=${env:SONAR_WEB_CONTEXT:-/}
sonar.web.javaAdditionalOpts=-Djava.security.egd=file:/dev/./urandom

# --- Elasticsearch ---
sonar.search.javaAdditionalOpts=-Dnode.store.allow_mmap=false

# --- Language Support ---
# Java (built-in)
sonar.java.enablePreviewFeatures=true
sonar.java.failOnException=false

# Kotlin (built-in)
sonar.kotlin.enablePreviewFeatures=true

# Python (built-in)
sonar.python.enablePreviewFeatures=true

# Go (built-in)
sonar.go.enablePreviewFeatures=true

# SQL (built-in)
sonar.sql.enablePreviewFeatures=true

# Shell (built-in)
sonar.shell.enablePreviewFeatures=true

# YAML / JSON (built-in)

# --- Security ---
sonar.forceAuthentication=true
sonar.allowDisableInheritedPermissions=false

# --- Performance ---
sonar.sonarcloud.enabled=false
sonar.updatecenter.activate=false
sonar.telemetry.enable=false

# --- Logging ---
sonar.log.level=${env:SONAR_LOG_LEVEL:-INFO}
sonar.log.jsonOutput=false

# --- Extensions ---
sonar.plugins.downloadOnlyRequired=false
